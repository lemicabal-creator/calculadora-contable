<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Contable | @contabilidadsinmultas</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: var(--secondary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .result { margin-top: 20px; padding: 10px; background: #e8f5e9; border-radius: 5px; display: none; }
        .whatsapp-button {
        position: fixed;
        width: 60px;
        height: 60px;
        bottom: 40px;
        right: 40px;
        background-color: #25d366;
        color: #FFF;
        border-radius: 50px;
        text-align: center;
        font-size: 30px;
        box-shadow: 2px 2px 3px #999;
        z-index: 100; /* Asegura que esté por encima de otros elementos */
        display: flex;
        justify-content: center;
        align-items: center;
        transition: transform 0.3s ease-in-out;
    }
        .whatsapp-button:hover {
        transform: scale(1.1);
    }

    .whatsapp-button img {
        width: 35px; /* Tamaño del icono de WhatsApp */
        height: 35px;
    }

    /* Media query para pantallas más pequeñas (móviles) */
    @media (max-width: 600px) {
        .whatsapp-button {
            width: 50px;
            height: 50px;
            bottom: 20px;
            right: 20px;
            font-size: 25px;
        }
        .whatsapp-button img {
            width: 30px;
            height: 30px;
        }
    }
    </style>
</head>
<body>
    <div class="card">
        <h2>Calculadora de Sueldo</h2>
        <p>@contabilidadsinmultas</p>
        <input type="number" id="sueldo" placeholder="Sueldo Bruto (Ej: 3000)">
        <button onclick="calcular()">Calcular Neto</button>
        <div id="resultado" class="result">
            <strong>Sueldo Neto: S/ <span id="monto"></span></strong>
        </div>
    </div>
    <script>
        function calcular() {
            const s = document.getElementById('sueldo').value;
            if(s > 0) {
                const neto = s * 0.87; // Descuento aproximado del 13%
                document.getElementById('monto').innerText = neto.toFixed(2);
                document.getElementById('resultado').style.display = 'block';
            }
        }
    </script>
    <a href="https://wa.me/996304618?text=Hola%2C%20quisiera%20una%20asesoría%20sobre%20contabilidad%20después%20de%20usar%20tu%20calculadora." 
   class="whatsapp-button" 
   target="_blank" 
   rel="noopener noreferrer">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>
</body>
</html>
