    <script>
        // Lógica del Semáforo de Riesgo
        let totalRisk = 0;
        function toggleRisk(element, val) {
            element.classList.toggle('active');
            if(element.classList.contains('active')) {
                totalRisk += val;
            } else {
                totalRisk -= val;
            }
            const valDisplay = document.getElementById('riesgo-valor');
            const msjDisplay = document.getElementById('semaforo-msj');
            if(valDisplay && msjDisplay) {
                valDisplay.innerText = totalRisk;
                if(totalRisk >= 70) {
                    valDisplay.style.color = "#ff4d4d";
                    msjDisplay.innerText = "¡PELIGRO! Multa inminente. Necesitas asesoría URGENTE.";
                } else if(totalRisk >= 30) {
                    valDisplay.style.color = "#ffa500";
                    msjDisplay.innerText = "CUIDADO. SUNAT podría ponerte en la mira pronto.";
                } else {
                    valDisplay.style.color = "#2ecc71";
                    msjDisplay.innerText = "Zona segura, pero no te descuides.";
                }
            }
        }

        // Lógica de la Calculadora de Sueldo
        function calcularNeto() {
            const s = document.getElementById('sueldo').value;
            const descDisplay = document.getElementById('desc');
            const netoDisplay = document.getElementById('neto');
            const resultadoBox = document.getElementById('resultado');

            if (s > 0 && descDisplay && netoDisplay && resultadoBox) {
                const d = s * 0.13;
                const n = s - d;
                descDisplay.innerText = 'S/ ' + d.toFixed(2);
                netoDisplay.innerText = 'S/ ' + n.toFixed(2);
                resultadoBox.style.display = 'block';
            }
        }
    </script>
